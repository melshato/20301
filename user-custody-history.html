<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/svg+xml" href="/assets/sajco-logo.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УМб ЪеПЙ ЗбгжЩЭ - SAJCO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>
    <div id="appShell">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="margin-bottom: 0;"><i class="fa-solid fa-user-clock"></i> УМб ЪеПЙ ЗбгжЩЭ</h3>
                    <button id="exportBtn" onclick="exportUserHistoryXLSX(lastSearchResults, _lastSearchUserName)" class="btn btn-ghost hidden">
                        <i class="fa-solid fa-file-excel" style="color: #16a34a;"></i> КХПнС Ебм Excel
                    </button>
                </div>
                <p style="color: var(--text-muted); margin-bottom: 20px;">ЗИНЛ Ъд гжЩЭ ИЗбСЮг ЗбжЩнЭн бЪСЦ КЗСнО ЗбГМеТЙ ЗбКн ПОбК жОСМК гд ЪеПКе.</p>

                <div class="form-row" style="margin-bottom: 20px; align-items: flex-end;">
                    <div class="form-group" style="flex: 2;">
                        <label for="searchEmpId" class="form-label">ЗбСЮг ЗбжЩнЭн ббгжЩЭ</label>
                        <input type="text" id="searchEmpId" class="form-input" placeholder="ЗПОб ЗбСЮг ЗбжЩнЭн ббгжЩЭ..." required>
                        <div id="searchedUserInfo" style="font-size: 0.8rem; color: var(--primary); margin-top: 5px;"></div>
                    </div>
                    <div class="form-group">
                        <button onclick="searchUserCustodyHistory()" class="btn btn-primary">
                            <i class="fa-solid fa-magnifying-glass"></i> ИНЛ
                        </button>
                    </div>
                </div>

                <hr style="margin: 30px 0; border-color: var(--border);">

                <h4>дКЗЖМ ЗбИНЛ</h4>
                <div class="table-container">
                    <table id="userCustodyHistoryTable">
                        <thead>
                            <tr>
                                <th>КЗСнО ЗбЪгбнЙ</th>
                                <th>ЗбМеЗТ (ЗбСЮг ЗбКУбУбн)</th>
                                <th>ЗбЪгбнЙ</th>
                                <th>ИжЗУШЙ</th>
                                <th>ЗбЭСЪ</th>
                                <th>гбЗНЩЗК</th>
                                <th>ККИЪ ЗбгжЗЭЮЗК</th>
                            </tr>
                        </thead>
                        <tbody id="userCustodyHistoryTableBody">
                            <tr><td colspan="7" style="text-align: center; color: var(--text-muted);">ЗПОб ЗбСЮг ЗбжЩнЭн жЗЦЫШ ИНЛ бЪСЦ ЗбУМб.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Supabase Integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-data-layer.js"></script>
    <script src="app-core.js"></script>
    <script src="excel-export.js"></script>
    <script>
        checkAuth();

        const userCustodyHistoryTableBody = document.getElementById('userCustodyHistoryTableBody');
        const searchEmpIdInput = document.getElementById('searchEmpId');
        const searchedUserInfoDiv = document.getElementById('searchedUserInfo');
        window.lastSearchResults = [];
        window._lastSearchUserName = '';

        searchEmpIdInput.addEventListener('input', () => {
            const empId = searchEmpIdInput.value.trim();
            document.getElementById('exportBtn').classList.add('hidden'); // ЕОЭЗБ ЗбТС ЪдП КЫннС ЗбгПОбЗК
            const user = db.users.find(u => u.empId === empId);
            if (user) {
                searchedUserInfoDiv.textContent = `ЗбгжЩЭ: ${user.name} (${user.role === 'admin' ? 'гПнС' : user.role === 'head' ? 'СЖнУ гУЗНнд' : 'гУЗН'})`;
            } else {
                searchedUserInfoDiv.textContent = '';
            }
        });

        function searchUserCustodyHistory() {
            const empId = searchEmpIdInput.value.trim();
            const exportBtn = document.getElementById('exportBtn');
            if (!empId) {
                alert('ЗбСМЗБ ЕПОЗб ЗбСЮг ЗбжЩнЭн ббгжЩЭ.');
                return;
            }

            const targetUser = db.users.find(u => u.empId === empId);
            if (!targetUser) {
                alert('бг нКг ЗбЪЛжС Ъбм гжЩЭ ИеРЗ ЗбСЮг ЗбжЩнЭн.');
                userCustodyHistoryTableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">бг нКг ЗбЪЛжС Ъбм гжЩЭ ИеРЗ ЗбСЮг ЗбжЩнЭн.</td></tr>';
                exportBtn.classList.add('hidden');
                return;
            }

            lastSearchResults = [];

            db.custodies.forEach(c => {
                if (c.status === 'approved') { // ЭЮШ ЗбУМбЗК ЗбгЪКгПЙ
                    // НЗбЙ: ЗбМеЗТ ПОб ЪеПЙ еРЗ ЗбгжЩЭ
                    if (c.userId === targetUser.id) {
                        lastSearchResults.push({
                            timestamp: c.timestamp,
                            serialNumber: c.serialNumber,
                            deviceType: c.deviceType,
                            action: c.transferData ? `дЮб Ебне гд ${c.transferData.fromUserName}` : 'ЗУКбЗг ЪеПЙ МПнПЙ',
                            byUser: db.users.find(u => u.id === c.assignedBy)?.name || 'ЗбдЩЗг',
                            branchId: c.branchId,
                            notes: c.notes || (c.transferData ? c.transferData.reason : ''),
                            approvalHistory: c.approvalHistory || []
                        });
                    }
                    // НЗбЙ: ЗбМеЗТ ОСМ гд ЪеПЙ еРЗ ЗбгжЩЭ (ЪИС дЮб)
                    if (c.transferData && c.transferData.fromUserId === targetUser.id) {
                        lastSearchResults.push({
                            timestamp: c.timestamp,
                            serialNumber: c.serialNumber,
                            deviceType: c.deviceType,
                            action: `дЮб где Ебм ${db.users.find(u => u.id === c.userId)?.name || 'ЫнС гЪСжЭ'}`,
                            byUser: db.users.find(u => u.id === c.assignedBy)?.name || 'ЗбдЩЗг',
                            branchId: c.branchId, // ЗбЭСЪ ЪдП ЗбдЮб
                            notes: c.notes || c.transferData.reason,
                            approvalHistory: c.approvalHistory || []
                        });
                    }
                }
            });

            lastSearchResults.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            _lastSearchUserName = targetUser.name;

            // ЕЩеЗС ЗбТС ЭЮШ Эн НЗб жМжП дКЗЖМ
            if (lastSearchResults.length > 0) {
                exportBtn.classList.remove('hidden');
            } else {
                exportBtn.classList.add('hidden');
            }

            renderUserCustodyHistory(lastSearchResults);
        }

        function renderUserCustodyHistory(records) {
            userCustodyHistoryTableBody.innerHTML = '';

            if (records.length === 0) {
                userCustodyHistoryTableBody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: var(--text-muted);">бЗ КжМП УМбЗК ЪеПЙ беРЗ ЗбгжЩЭ.</td></tr>';
                return;
            }

            records.forEach(record => {
                const branch = db.branches.find(b => b.id === record.branchId);
                const row = userCustodyHistoryTableBody.insertRow();
                row.insertCell().textContent = new Date(record.timestamp).toLocaleString('ar-EG');
                row.insertCell().textContent = `${getDeviceTypeName(record.deviceType)} (S/N: ${record.serialNumber})`;
                row.insertCell().textContent = record.action;
                row.insertCell().textContent = record.byUser;
                row.insertCell().textContent = branch ? branch.name : '—';
                row.insertCell().textContent = record.notes || '—';
                
                const historyCell = row.insertCell();
                historyCell.innerHTML = record.approvalHistory && record.approvalHistory.length > 0 
                    ? record.approvalHistory.map(h => `<div style="font-size:0.75rem; border-bottom:1px solid #eee; margin-bottom:4px; padding-bottom:4px;">
                        <i class="fa-solid fa-check-double" style="color:var(--primary)"></i> <strong>${h.approverRole}:</strong> ${h.approverName}<br>
                        <small style="color:var(--text-muted)">${new Date(h.timestamp).toLocaleString('ar-EG')}</small></div>`).join('')
                    : '<span style="color:var(--text-muted)">—</span>';
            });
        }

        window.onload = () => {
            renderSidebar();
        };
    </script>
</body>
</html>
