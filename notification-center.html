<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الإشعارات | ساجكو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-data-layer.js"></script>
    <script src="app-core.js"></script>
    <script src="excel-export.js"></script>
    <style>
        .notif-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .notif-count-bubble {
            background: #ef4444;
            color: #fff;
            font-size: .75rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 12px;
            margin-right: 8px;
        }

        .notif-filter-tabs {
            display: flex;
            gap: 6px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 7px 16px;
            border: none;
            background: transparent;
            border-radius: 9px;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            color: var(--text-muted);
        }

        .filter-tab.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }

        .notif-icon-wrap {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1rem;
        }

        .notif-message { font-weight: 500; font-size: .9rem; line-height: 1.5; }
        .notif-time { font-size: .75rem; color: var(--text-muted); margin-top: 3px; }

        .notif-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            min-width: 100px;
        }

        .notif-mark-read {
            font-size: .72rem;
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            border: none;
            background: none;
            padding: 2px 0;
        }

        .notif-delete {
            font-size: .72rem;
            color: #ef4444;
            cursor: pointer;
            font-weight: 600;
            border: none;
            background: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: .4; display: block; }
        .empty-state p { font-size: 1rem; }

        .realtime-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .78rem;
            color: #16a34a;
            font-weight: 600;
        }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-overlay.hidden { display: none; }
        .modal-box {
            background: #fff; border-radius: 16px; padding: 24px;
            max-width: 520px; width: 93%; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,.15);
        }
        .acceptance-warning {
            background: #fef2f2; border: 1px solid #fecaca; border-right: 4px solid #ef4444;
            padding: 12px 14px; border-radius: 10px; margin-bottom: 16px;
            font-size: .82rem; color: #991b1b;
        }
        .acceptance-confirm-row {
            display: flex; align-items: flex-start; gap: 10px;
            background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px;
            padding: 12px 14px; margin-top: 14px; font-size: .85rem; line-height: 1.6;
        }
        .acceptance-confirm-row input[type="checkbox"] { margin-top: 3px; transform: scale(1.1); }

        .realtime-dot {
            width: 8px;
            height: 8px;
            background: #16a34a;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: .3; }
        }
    </style>
</head>
<body>
<div id="appShell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
        <div class="notif-header-bar">
            <div>
                <h2 style="font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:10px;">
                    <i class="fa-solid fa-bell" style="color:var(--primary)"></i>
                    مركز الإشعارات
                    <span class="notif-count-bubble" id="unreadCountBubble" style="display:none;">0</span>
                </h2>
                <p style="color:var(--text-muted);margin-top:4px;">تحديث لحظي — من أي إشعار يمكنك الانتقال مباشرة للخدمة</p>
            </div>
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                <span class="realtime-indicator">
                    <span class="realtime-dot"></span>
                    مباشر
                </span>
                <button onclick="handleMarkAllRead()" class="btn btn-ghost btn-sm">
                    <i class="fa-solid fa-check-double"></i> تحديد الكل كمقروء
                </button>
                <button onclick="exportNotificationsXLSX()" class="btn btn-ghost btn-sm">
                    <i class="fa-solid fa-file-excel" style="color:#16a34a;"></i> تصدير Excel
                </button>
                <button onclick="if(confirm('حذف جميع الإشعارات المقروءة؟')) clearReadNotifications()" class="btn btn-ghost btn-sm" style="color:#ef4444;">
                    <i class="fa-solid fa-trash-can"></i> حذف المقروءة
                </button>
            </div>
        </div>

        <div class="notif-filter-tabs" style="margin-bottom:20px;">
            <button class="filter-tab active" onclick="setFilter('all',this)">الكل</button>
            <button class="filter-tab" onclick="setFilter('unread',this)">غير مقروءة</button>
            <button class="filter-tab" onclick="setFilter('requires_action',this)">تحتاج إجراء</button>
            <button class="filter-tab" onclick="setFilter('warning',this)">تحذيرات</button>
            <button class="filter-tab" onclick="setFilter('success',this)">نجاح</button>
        </div>

        <div class="card" style="padding:0;overflow:hidden;">
            <div id="notificationsList"></div>
        </div>
    </main>
</div>

<div class="toast-wrap" id="toasts"></div>

<!-- مودال قبول العهدة -->
<div id="acceptCustodyModal" class="modal-overlay hidden">
    <div class="modal-box">
        <h3 style="margin-bottom:14px;"><i class="fa-solid fa-circle-check" style="color:#16a34a;"></i> قبول العهدة</h3>
        <input type="hidden" id="acceptCustodyId">
        <input type="hidden" id="acceptNotifId">

        <div class="acceptance-warning">
            <strong><i class="fa-solid fa-triangle-exclamation"></i> تنبيه عند الاستلام:</strong><br>
            يرجى التحقق بدقة من أن <strong>جميع قطع وأكسسوارات الجهاز مكتملة</strong> قبل تأكيد الاستلام.
        </div>

        <div class="form-group">
            <label class="form-label">تقييم حالة الجهاز <span style="color:#ef4444;">*</span></label>
            <select id="acceptDeviceCondition" class="form-select">
                <option value="">اختر التقييم...</option>
                <option value="ممتاز">ممتاز — مكتمل ويعمل بكفاءة تامة</option>
                <option value="جيد">جيد — مكتمل مع بعض الخدوش</option>
                <option value="مقبول">مقبول — ناقص بعض الملحقات</option>
                <option value="يحتاج صيانة">يحتاج صيانة — به عطل أو خلل</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">هل أنت راضٍ عن حالة الجهاز؟ <span style="color:#ef4444;">*</span></label>
            <div style="display:flex;gap:20px;margin-top:6px;">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                    <input type="radio" name="acceptSatisfied" value="true"> نعم
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
                    <input type="radio" name="acceptSatisfied" value="false"> لا
                </label>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">ملاحظات على الجهاز المستلم</label>
            <textarea id="acceptNotes" class="form-textarea" rows="3" placeholder="اذكر أي نقص في الأدوات أو الأكسسوارات..."></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">مدى اهتمامك بالجهاز (وصف مختصر)</label>
            <input type="text" id="acceptCareLevel" class="form-input" placeholder="مثال: أحرص على نظافته وصيانته الدورية">
        </div>
        <div class="form-group">
            <label class="form-label">تعليق إضافي (اختياري)</label>
            <textarea id="acceptComment" class="form-textarea" rows="2" placeholder="أي تعليق إضافي..."></textarea>
        </div>

        <div class="acceptance-confirm-row">
            <input type="checkbox" id="acceptConfirmCheck">
            <label for="acceptConfirmCheck">
                أُقر وأؤكد أنني تحققت من أن جميع قطع وأكسسوارات الجهاز كاملة وهو في عهدتي الآن، وأتحمل المسؤولية الكاملة عن سلامته.
            </label>
        </div>

        <div style="display:flex;gap:10px;margin-top:18px;">
            <button onclick="submitAcceptCustody()" class="btn btn-primary" style="flex:1;"><i class="fa-solid fa-check"></i> تأكيد الاستلام</button>
            <button onclick="closeAcceptCustodyModal()" class="btn btn-ghost" style="flex:1;">إلغاء</button>
        </div>
    </div>
</div>

<!-- مودال رفض العهدة -->
<div id="rejectCustodyModal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:420px;">
        <h3 style="margin-bottom:16px;"><i class="fa-solid fa-circle-xmark" style="color:#ef4444;"></i> رفض العهدة</h3>
        <input type="hidden" id="rejectCustodyId">
        <input type="hidden" id="rejectNotifId">
        <div class="form-group">
            <label class="form-label">سبب الرفض <span style="color:#ef4444;">*</span></label>
            <textarea id="rejectReason" class="form-textarea" rows="3" placeholder="أدخل سبب الرفض..."></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:16px;">
            <button onclick="submitRejectCustody()" class="btn btn-ghost" style="flex:1;color:#ef4444;border-color:#ef4444;"><i class="fa-solid fa-xmark"></i> تأكيد الرفض</button>
            <button onclick="closeRejectCustodyModal()" class="btn btn-ghost" style="flex:1;">إلغاء</button>
        </div>
    </div>
</div>

<script>
checkAuth();

let _currentFilter = 'all';

function onNewNotification() {
    renderNotificationCenter();
}

function setFilter(filter, btn) {
    _currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderNotificationCenter();
}

function renderNotificationCenter() {
    let userNotifs = db.notifications
        .filter(n => n.userId === currentUser.id)
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

    if (_currentFilter === 'unread') userNotifs = userNotifs.filter(n => !n.read);
    else if (_currentFilter === 'requires_action') userNotifs = userNotifs.filter(n => n.requiresAction && !n.read);
    else if (_currentFilter === 'warning') userNotifs = userNotifs.filter(n => n.type === 'warning');
    else if (_currentFilter === 'success') userNotifs = userNotifs.filter(n => n.type === 'success');

    const unreadCount = db.notifications.filter(n => n.userId === currentUser.id && !n.read).length;
    const bubble = document.getElementById('unreadCountBubble');
    bubble.textContent = unreadCount;
    bubble.style.display = unreadCount > 0 ? 'inline-block' : 'none';

    const list = document.getElementById('notificationsList');

    if (userNotifs.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <i class="fa-solid fa-bell-slash"></i>
                <p>لا توجد إشعارات في هذا القسم</p>
            </div>`;
        return;
    }

    list.innerHTML = userNotifs.map(n => _renderNotifItem(n)).join('');
}

function _renderNotifItem(n) {
    const icons = {
        warning: { icon: 'fa-triangle-exclamation', bg: '#fef3c7', color: '#92400e' },
        error:   { icon: 'fa-circle-xmark',         bg: '#fee2e2', color: '#991b1b' },
        success: { icon: 'fa-circle-check',          bg: '#dcfce7', color: '#166534' },
        info:    { icon: 'fa-circle-info',           bg: '#dbeafe', color: '#1e40af' },
        general: { icon: 'fa-bell',                  bg: '#f1f5f9', color: '#475569' }
    };
    const ic = icons[n.type] || icons.general;
    const actionBtns = _buildActionButtons(n);
    const serviceLink = n.actionUrl
        ? `<a href="${n.actionUrl}" class="btn-view-service" onclick="markNotificationAsRead('${n.id}')"><i class="fa-solid fa-arrow-left"></i> عرض</a>`
        : '';
    const timeStr = _formatRelativeTime(n.timestamp);

    return `
        <div class="notification-item ${n.read ? '' : 'unread'}" id="notif-${n.id}">
            <div class="notif-icon-wrap" style="background:${ic.bg};color:${ic.color};">
                <i class="fa-solid ${ic.icon}"></i>
            </div>
            <div class="notif-content" style="flex:1;min-width:0;">
                <div class="notif-message">${n.message}</div>
                <div class="notif-time">
                    <i class="fa-regular fa-clock"></i> ${timeStr}
                    ${n.isSubstituteNotif ? '<span class="badge badge-info" style="margin-right:6px;font-size:.65rem;padding:2px 7px;">بديل</span>' : ''}
                    ${n.requiresAction && !n.read ? '<span style="color:#ef4444;font-size:.72rem;font-weight:700;margin-right:6px;"><i class="fa-solid fa-circle-exclamation"></i> يحتاج إجراء</span>' : ''}
                </div>
                ${actionBtns
                    ? `<div class="notif-action-btns">${actionBtns}${serviceLink}</div>`
                    : (serviceLink ? `<div style="margin-top:8px;">${serviceLink}</div>` : '')}
            </div>
            <div class="notif-actions">
                ${!n.read
                    ? `<button class="notif-mark-read" onclick="handleMarkRead('${n.id}')"><i class="fa-solid fa-check"></i> قراءة</button>`
                    : '<span style="font-size:.72rem;color:#94a3b8;">مقروء</span>'}
                <button class="notif-delete" onclick="handleDelete('${n.id}')"><i class="fa-regular fa-trash-can"></i></button>
            </div>
        </div>`;
}

function _buildActionButtons(n) {
    if (!n.requiresAction || n.read) return '';

    if (n.actionType === 'custody_transfer_request' && n.relatedId) {
        const c = db.custodies.find(x => x.id === n.relatedId);
        if (!c || c.status !== 'pending_surveyor_acceptance') return '';
        const u = db.users.find(x => x.id === c.userId);
        if (!u || String(u.empId) !== String(currentUser.empId)) return '';
        return `
            <button class="btn-approve" onclick="openAcceptCustodyModal('${n.relatedId}','${n.id}')"><i class="fa-solid fa-check"></i> قبول العهدة</button>
            <button class="btn-reject" onclick="openRejectCustodyModal('${n.relatedId}','${n.id}')"><i class="fa-solid fa-xmark"></i> رفض</button>`;
    }

    if (n.actionType === 'custody_approval' && n.relatedId) {
        const c = db.custodies.find(x => x.id === n.relatedId);
        if (!c) return '';
        const canApprove =
            (currentUser.role === 'admin' && ['pending_admin_approval','pending_head_approval','pending_approval'].includes(c.status)) ||
            (currentUser.role === 'head' && c.status === 'pending_head_approval' && c.branchId === currentUser.responsibleBranch);
        if (!canApprove) return '';
        return `
            <button class="btn-approve" onclick="doApproveCustody('${n.relatedId}','${n.id}')"><i class="fa-solid fa-check"></i> قبول</button>
            <button class="btn-reject" onclick="doRejectCustody('${n.relatedId}','${n.id}')"><i class="fa-solid fa-xmark"></i> رفض</button>`;
    }

    if (n.actionType === 'leave_approval' && n.relatedId) {
        const lr = db.leaveRequests?.find(x => x.id === n.relatedId);
        if (!lr) return '';
        const canApprove =
            (currentUser.role === 'admin' && lr.status === 'pending_admin_approval') ||
            (currentUser.role === 'head' && lr.status === 'pending_head_approval' && lr.branchId === currentUser.responsibleBranch);
        if (!canApprove) return '';
        return `
            <button class="btn-approve" onclick="doApproveLeave('${n.relatedId}','${n.id}')"><i class="fa-solid fa-check"></i> قبول</button>
            <button class="btn-reject" onclick="doRejectLeave('${n.relatedId}','${n.id}')"><i class="fa-solid fa-xmark"></i> رفض</button>`;
    }

    if (n.actionType === 'worker_transfer' && n.relatedId) {
        const req = db.workerTransferRequests?.find(x => x.id === n.relatedId);
        if (!req) return '';
        const canApprove =
            (currentUser.role === 'surveyor' && req.status === 'pending_receiver' && req.toSurveyorId === currentUser.id) ||
            (currentUser.role === 'head' && req.status === 'pending_head') ||
            (currentUser.role === 'admin' && ['pending_receiver','pending_head','pending_admin'].includes(req.status));
        if (!canApprove) return '';
        return `
            <button class="btn-approve" onclick="doApproveWorkerTransfer('${n.relatedId}','${n.id}')"><i class="fa-solid fa-check"></i> قبول النقل</button>
            <button class="btn-reject" onclick="doRejectWorkerTransfer('${n.relatedId}','${n.id}')"><i class="fa-solid fa-xmark"></i> رفض</button>`;
    }

    if (n.actionType === 'maintenance_request' && n.relatedId && currentUser.role === 'admin') {
        const mr = db.maintenanceRequests?.find(x => x.id === n.relatedId);
        if (!mr || mr.status !== 'pending') return '';
        return `
            <button class="btn-approve" onclick="doApproveMR('${n.relatedId}','${n.id}')"><i class="fa-solid fa-check"></i> الموافقة والإرسال للوكيل</button>
            <button class="btn-reject" onclick="doRejectMR('${n.relatedId}','${n.id}')"><i class="fa-solid fa-xmark"></i> رفض</button>`;
    }

    if (n.actionType === 'user_approval' && n.relatedId && currentUser.role === 'admin') {
        const u = db.users.find(x => x.id === n.relatedId);
        if (!u || u.status !== 'pending') return '';
        return `
            <button class="btn-approve" onclick="doApproveUser('${n.relatedId}','${n.id}')"><i class="fa-solid fa-user-check"></i> قبول الحساب</button>
            <button class="btn-reject" onclick="doRejectUser('${n.relatedId}','${n.id}')"><i class="fa-solid fa-user-xmark"></i> رفض</button>`;
    }

    if (n.actionType === 'direct_message' && currentUser.role === 'admin') {
        return `<span style="font-size:.75rem;color:#64748b;">اضغط "عرض" للرد على الرسالة</span>`;
    }

    return '';
}

function _formatRelativeTime(timestamp) {
    const diff = Date.now() - new Date(timestamp).getTime();
    const m = Math.floor(diff / 60000);
    const h = Math.floor(diff / 3600000);
    const d = Math.floor(diff / 86400000);
    if (m < 1) return 'الآن';
    if (m < 60) return `منذ ${m} دقيقة`;
    if (h < 24) return `منذ ${h} ساعة`;
    if (d < 7) return `منذ ${d} يوم`;
    return new Date(timestamp).toLocaleDateString('ar-SA', { year:'numeric', month:'short', day:'numeric' });
}

window.handleMarkRead = (id) => {
    markNotificationAsRead(id);
    renderNotificationCenter();
};

window.handleMarkAllRead = () => {
    markAllNotificationsAsRead();
    renderNotificationCenter();
    showToast('تم تحديد جميع الإشعارات كمقروءة', 'success');
};

window.handleDelete = (id) => {
    if (confirm('هل أنت متأكد من حذف هذا الإشعار؟')) {
        deleteNotification(id);
        renderNotificationCenter();
    }
};

window.clearReadNotifications = () => {
    const before = db.notifications.length;
    db.notifications = db.notifications.filter(n => !(n.userId === currentUser.id && n.read));
    const count = before - db.notifications.length;
    if (count > 0) {
        saveDB(true);
        _updateNotificationBadge();
        renderNotificationCenter();
        showToast(`تم حذف ${count} إشعار مقروء`, 'success');
    }
};

window.doApproveCustody = (relatedId, notifId) => {
    if (!confirm('هل أنت متأكد من الموافقة على طلب العهدة؟')) return;
    if (approveCustody(relatedId, currentUser.role)) {
        markNotificationAsRead(notifId);
        renderNotificationCenter();
        showToast('تمت الموافقة على طلب العهدة بنجاح', 'success');
    } else {
        showToast('لا يمكن الموافقة — تأكد من صلاحيتك', 'error');
    }
};

window.doRejectCustody = (relatedId, notifId) => {
    if (!confirm('هل أنت متأكد من رفض طلب العهدة؟')) return;
    if (rejectCustody(relatedId)) {
        markNotificationAsRead(notifId);
        renderNotificationCenter();
        showToast('تم رفض طلب العهدة', 'success');
    } else {
        showToast('لا يمكن الرفض — تأكد من صلاحيتك', 'error');
    }
};

// ── قبول/رفض العهدة من المساح (custody_transfer_request) ──
window.openAcceptCustodyModal = (custodyId, notifId) => {
    document.getElementById('acceptCustodyId').value = custodyId;
    document.getElementById('acceptNotifId').value = notifId;
    document.getElementById('acceptDeviceCondition').value = '';
    document.getElementById('acceptNotes').value = '';
    document.getElementById('acceptCareLevel').value = '';
    document.getElementById('acceptComment').value = '';
    document.getElementById('acceptConfirmCheck').checked = false;
    document.querySelectorAll('#acceptCustodyModal input[name="acceptSatisfied"]').forEach(r => r.checked = false);
    document.getElementById('acceptCustodyModal').classList.remove('hidden');
};
window.closeAcceptCustodyModal = () => {
    document.getElementById('acceptCustodyModal').classList.add('hidden');
};
window.submitAcceptCustody = () => {
    const id = document.getElementById('acceptCustodyId').value;
    const notifId = document.getElementById('acceptNotifId').value;
    const condition = document.getElementById('acceptDeviceCondition').value;
    const notes = document.getElementById('acceptNotes').value.trim();
    const careLevel = document.getElementById('acceptCareLevel').value.trim();
    const comment = document.getElementById('acceptComment').value.trim();
    const confirmed = document.getElementById('acceptConfirmCheck').checked;
    const satisfiedVal = document.querySelector('#acceptCustodyModal input[name="acceptSatisfied"]:checked')?.value;
    const satisfied = satisfiedVal === 'true' ? true : satisfiedVal === 'false' ? false : null;

    if (!condition) { showToast('يرجى تقييم حالة الجهاز.', 'error'); return; }
    if (satisfied === null) { showToast('يرجى تحديد مدى رضاك عن حالة الجهاز.', 'error'); return; }
    if (!confirmed) { showToast('يجب تأكيد الإقرار بالاستلام.', 'error'); return; }

    if (acceptCustodyBySurveyor(id, notes, condition, comment, satisfied, careLevel)) {
        markNotificationAsRead(notifId);
        closeAcceptCustodyModal();
        renderNotificationCenter();
        showToast('تم قبول العهدة بنجاح وتسجيلها في عهدتك.', 'success');
    } else {
        showToast('حدث خطأ. تأكد من صلاحيتك.', 'error');
    }
};

window.openRejectCustodyModal = (custodyId, notifId) => {
    document.getElementById('rejectCustodyId').value = custodyId;
    document.getElementById('rejectNotifId').value = notifId;
    document.getElementById('rejectReason').value = '';
    document.getElementById('rejectCustodyModal').classList.remove('hidden');
};
window.closeRejectCustodyModal = () => {
    document.getElementById('rejectCustodyModal').classList.add('hidden');
};
window.submitRejectCustody = () => {
    const id = document.getElementById('rejectCustodyId').value;
    const notifId = document.getElementById('rejectNotifId').value;
    const reason = document.getElementById('rejectReason').value.trim();
    if (!reason) { showToast('يجب كتابة سبب الرفض.', 'error'); return; }

    if (rejectCustodyBySurveyor(id, reason)) {
        markNotificationAsRead(notifId);
        closeRejectCustodyModal();
        renderNotificationCenter();
        showToast('تم رفض العهدة وإبلاغ المسؤول.', 'success');
    } else {
        showToast('حدث خطأ. تأكد من صلاحيتك.', 'error');
    }
};

function showToast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast ${type === 'error' ? 'error' : ''}`;
    el.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'}"></i> <span>${msg}</span>`;
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => { el.style.opacity='0'; el.style.transform='translateY(-20px)'; setTimeout(()=>el.remove(),500); }, 3500);
}

window.refreshPage = renderNotificationCenter;

setInterval(renderNotificationCenter, 30000);

window.onload = () => {
    renderSidebar();
    renderNotificationCenter();
};
