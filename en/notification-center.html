<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Center | SAJCO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-data-layer.js"></script>
    <script src="app-core.js"></script>
    <style>
        .notif-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .notif-count-bubble {
            background: #ef4444;
            color: #fff;
            font-size: .75rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }

        .notif-filter-tabs {
            display: flex;
            gap: 6px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 7px 16px;
            border: none;
            background: transparent;
            border-radius: 9px;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            color: var(--text-muted);
        }

        .filter-tab.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
        }

        .notif-icon-wrap {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1rem;
        }

        .notif-message { font-weight: 500; font-size: .9rem; line-height: 1.5; }
        .notif-time { font-size: .75rem; color: var(--text-muted); margin-top: 3px; }

        .notif-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            min-width: 100px;
        }

        .notif-mark-read {
            font-size: .72rem;
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            border: none;
            background: none;
            padding: 2px 0;
        }

        .notif-delete {
            font-size: .72rem;
            color: #ef4444;
            cursor: pointer;
            font-weight: 600;
            border: none;
            background: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i { font-size: 3rem; margin-bottom: 16px; opacity: .4; display: block; }
        .empty-state p { font-size: 1rem; }

        .realtime-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: .78rem;
            color: #16a34a;
            font-weight: 600;
        }

        .realtime-dot {
            width: 8px;
            height: 8px;
            background: #16a34a;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: .3; }
        }
    </style>
</head>
<body>
<div id="appShell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
        <div class="notif-header-bar">
            <div>
                <h2 style="font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:10px;">
                    <i class="fa-solid fa-bell" style="color:var(--primary)"></i>
                    Notification Center
                    <span class="notif-count-bubble" id="unreadCountBubble" style="display:none;">0</span>
                </h2>
                <p style="color:var(--text-muted);margin-top:4px;">Real-time updates — navigate directly to any service from a notification</p>
            </div>
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                <span class="realtime-indicator">
                    <span class="realtime-dot"></span>
                    Live
                </span>
                <button onclick="handleMarkAllRead()" class="btn btn-ghost btn-sm">
                    <i class="fa-solid fa-check-double"></i> Mark All as Read
                </button>
                <button onclick="if(confirm('Delete all read notifications?')) clearReadNotifications()" class="btn btn-ghost btn-sm" style="color:#ef4444;">
                    <i class="fa-solid fa-trash-can"></i> Delete Read
                </button>
            </div>
        </div>

        <div class="notif-filter-tabs" style="margin-bottom:20px;">
            <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
            <button class="filter-tab" onclick="setFilter('unread',this)">Unread</button>
            <button class="filter-tab" onclick="setFilter('requires_action',this)">Requires Action</button>
            <button class="filter-tab" onclick="setFilter('warning',this)">Warnings</button>
            <button class="filter-tab" onclick="setFilter('success',this)">Success</button>
        </div>

        <div class="card" style="padding:0;overflow:hidden;">
            <div id="notificationsList"></div>
        </div>
    </main>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
checkAuth();

let _currentFilter = 'all';

function onNewNotification() {
    renderNotificationCenter();
}

function setFilter(filter, btn) {
    _currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderNotificationCenter();
}

function renderNotificationCenter() {
    reloadDB();
    let userNotifs = db.notifications
        .filter(n => n.userId === currentUser.id)
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

    if (_currentFilter === 'unread') userNotifs = userNotifs.filter(n => !n.read);
    else if (_currentFilter === 'requires_action') userNotifs = userNotifs.filter(n => n.requiresAction && !n.read);
    else if (_currentFilter === 'warning') userNotifs = userNotifs.filter(n => n.type === 'warning');
    else if (_currentFilter === 'success') userNotifs = userNotifs.filter(n => n.type === 'success');

    const unreadCount = db.notifications.filter(n => n.userId === currentUser.id && !n.read).length;
    const bubble = document.getElementById('unreadCountBubble');
    bubble.textContent = unreadCount;
    bubble.style.display = unreadCount > 0 ? 'inline-block' : 'none';

    const list = document.getElementById('notificationsList');

    if (userNotifs.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <i class="fa-solid fa-bell-slash"></i>
                <p>No notifications in this section</p>
            </div>`;
        return;
    }

    list.innerHTML = userNotifs.map(n => _renderNotifItem(n)).join('');
}

function _renderNotifItem(n) {
    const icons = {
        warning: { icon: 'fa-triangle-exclamation', bg: '#fef3c7', color: '#92400e' },
        error:   { icon: 'fa-circle-xmark',         bg: '#fee2e2', color: '#991b1b' },
        success: { icon: 'fa-circle-check',          bg: '#dcfce7', color: '#166534' },
        info:    { icon: 'fa-circle-info',           bg: '#dbeafe', color: '#1e40af' },
        general: { icon: 'fa-bell',                  bg: '#f1f5f9', color: '#475569' }
    };
    const ic = icons[n.type] || icons.general;
    const actionBtns = _buildActionButtons(n);
    const serviceLink = n.actionUrl
        ? `<a href="${n.actionUrl}" class="btn-view-service" onclick="markNotificationAsRead('${n.id}')"><i class="fa-solid fa-arrow-right"></i> View</a>`
        : '';
    const timeStr = _formatRelativeTime(n.timestamp);

    return `
        <div class="notification-item ${n.read ? '' : 'unread'}" id="notif-${n.id}">
            <div class="notif-icon-wrap" style="background:${ic.bg};color:${ic.color};">
                <i class="fa-solid ${ic.icon}"></i>
            </div>
            <div class="notif-content" style="flex:1;min-width:0;">
                <div class="notif-message">${n.message}</div>
                <div class="notif-time">
                    <i class="fa-regular fa-clock"></i> ${timeStr}
                    ${n.isSubstituteNotif ? '<span class="badge badge-info" style="margin-left:6px;font-size:.65rem;padding:2px 7px;">Substitute</span>' : ''}
                    ${n.requiresAction && !n.read ? '<span style="color:#ef4444;font-size:.72rem;font-weight:700;margin-left:6px;"><i class="fa-solid fa-circle-exclamation"></i> Requires Action</span>' : ''}
                </div>
                ${actionBtns
                    ? `<div class="notif-action-btns">${actionBtns}${serviceLink}</div>`
                    : (serviceLink ? `<div style="margin-top:8px;">${serviceLink}</div>` : '')}
            </div>
            <div class="notif-actions">
                ${!n.read
                    ? `<button class="notif-mark-read" onclick="handleMarkRead('${n.id}')"><i class="fa-solid fa-check"></i> Read</button>`
                    : '<span style="font-size:.72rem;color:#94a3b8;">Read</span>'}
                <button class="notif-delete" onclick="handleDelete('${n.id}')"><i class="fa-regular fa-trash-can"></i></button>
            </div>
        </div>`;
}

function _buildActionButtons(n) {
    if (!n.requiresAction || n.read) return '';

    if (n.actionType === 'custody_approval' && n.relatedId) {
        const c = db.custodies.find(x => x.id === n.relatedId);
        if (!c) return '';
        const canApprove =
            (currentUser.role === 'admin' && ['pending_admin_approval','pending_head_approval','pending_approval'].includes(c.status)) ||
            (currentUser.role === 'head' && c.status === 'pending_head_approval' && c.branchId === currentUser.responsibleBranch);
        if (!canApprove) return '';
        return `
            <button class="btn-approve" onclick="doApproveCustody('${n.relatedId}','${n.id}')"><i class="fa-solid fa-check"></i> Approve</button>
            <button class="btn-reject" onclick="doRejectCustody('${n.relatedId}','${n.id}')"><i class="fa-solid fa-xmark"></i> Reject</button>`;
    }

    if (n.actionType === 'leave_approval' && n.relatedId) {
        const lr = db.leaveRequests?.find(x => x.id === n.relatedId);
        if (!lr) return '';
        const canApprove =
            (currentUser.role === 'admin' && lr.status === 'pending_admin_approval') ||
            (currentUser.role === 'head' && lr.status === 'pending_head_approval' && lr.branchId === currentUser.responsibleBranch);
        if (!canApprove) return '';
        return `
            <button class="btn-approve" onclick="doApproveLeave('${n.relatedId}','${n.id}')"><i class="fa-solid fa-check"></i> Approve</button>
            <button class="btn-reject" onclick="doRejectLeave('${n.relatedId}','${n.id}')"><i class="fa-solid fa-xmark"></i> Reject</button>`;
    }

    if (n.actionType === 'worker_transfer' && n.relatedId) {
        const req = db.workerTransferRequests?.find(x => x.id === n.relatedId);
        if (!req) return '';
        const canApprove =
            (currentUser.role === 'surveyor' && req.status === 'pending_receiver' && req.toSurveyorId === currentUser.id) ||
            (currentUser.role === 'head' && req.status === 'pending_head') ||
            (currentUser.role === 'admin' && ['pending_receiver','pending_head','pending_admin'].includes(req.status));
        if (!canApprove) return '';
        return `
            <button class="btn-approve" onclick="doApproveWorkerTransfer('${n.relatedId}','${n.id}')"><i class="fa-solid fa-check"></i> Approve Transfer</button>
            <button class="btn-reject" onclick="doRejectWorkerTransfer('${n.relatedId}','${n.id}')"><i class="fa-solid fa-xmark"></i> Reject</button>`;
    }

    if (n.actionType === 'maintenance_request' && n.relatedId && currentUser.role === 'admin') {
        const mr = db.maintenanceRequests?.find(x => x.id === n.relatedId);
        if (!mr || mr.status !== 'pending') return '';
        return `
            <button class="btn-approve" onclick="doApproveMR('${n.relatedId}','${n.id}')"><i class="fa-solid fa-check"></i> Approve & Send to Vendor</button>
            <button class="btn-reject" onclick="doRejectMR('${n.relatedId}','${n.id}')"><i class="fa-solid fa-xmark"></i> Reject</button>`;
    }

    if (n.actionType === 'user_approval' && n.relatedId && currentUser.role === 'admin') {
        const u = db.users.find(x => x.id === n.relatedId);
        if (!u || u.status !== 'pending') return '';
        return `
            <button class="btn-approve" onclick="doApproveUser('${n.relatedId}','${n.id}')"><i class="fa-solid fa-user-check"></i> Approve Account</button>
            <button class="btn-reject" onclick="doRejectUser('${n.relatedId}','${n.id}')"><i class="fa-solid fa-user-xmark"></i> Reject</button>`;
    }

    if (n.actionType === 'direct_message' && currentUser.role === 'admin') {
        return `<span style="font-size:.75rem;color:#64748b;">Click "View" to reply to the message</span>`;
    }

    return '';
}

function _formatRelativeTime(timestamp) {
    const diff = Date.now() - new Date(timestamp).getTime();
    const m = Math.floor(diff / 60000);
    const h = Math.floor(diff / 3600000);
    const d = Math.floor(diff / 86400000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    if (h < 24) return `${h}h ago`;
    if (d < 7) return `${d}d ago`;
    return new Date(timestamp).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}

window.handleMarkRead = (id) => {
    markNotificationAsRead(id);
    renderNotificationCenter();
};

window.handleMarkAllRead = () => {
    markAllNotificationsAsRead();
    renderNotificationCenter();
    showToast('All notifications marked as read', 'success');
};

window.handleDelete = (id) => {
    if (confirm('Are you sure you want to delete this notification?')) {
        deleteNotification(id);
        renderNotificationCenter();
    }
};

window.clearReadNotifications = () => {
    const before = db.notifications.length;
    db.notifications = db.notifications.filter(n => !(n.userId === currentUser.id && n.read));
    const count = before - db.notifications.length;
    if (count > 0) {
        saveDB(true);
        _updateNotificationBadge();
        renderNotificationCenter();
        showToast(`Deleted ${count} read notification${count > 1 ? 's' : ''}`, 'success');
    }
};

window.doApproveCustody = (relatedId, notifId) => {
    if (!confirm('Are you sure you want to approve this custody request?')) return;
    if (approveCustody(relatedId, currentUser.role)) {
        markNotificationAsRead(notifId);
        renderNotificationCenter();
        showToast('Custody request approved successfully', 'success');
    } else {
        showToast('Cannot approve — check your permissions', 'error');
    }
};

window.doRejectCustody = (relatedId, notifId) => {
    if (!confirm('Are you sure you want to reject this custody request?')) return;
    if (rejectCustody(relatedId)) {
        markNotificationAsRead(notifId);
        renderNotificationCenter();
        showToast('Custody request rejected', 'success');
    } else {
        showToast('Cannot reject — check your permissions', 'error');
    }
};

window.doApproveLeave = (relatedId, notifId) => {
    if (!confirm('Are you sure you want to approve this leave request?')) return;
    if (approveLeaveRequest(relatedId, currentUser.role)) {
        markNotificationAsRead(notifId);
        renderNotificationCenter();
        showToast('Leave request approved', 'success');
    } else {
        showToast('Cannot approve — check your permissions', 'error');
    }
};

window.doRejectLeave = (relatedId, notifId) => {
    if (!confirm('Are you sure you want to reject this leave request?')) return;
    if (rejectLeaveRequest(relatedId)) {
        markNotificationAsRead(notifId);
        renderNotificationCenter();
        showToast('Leave request rejected', 'success');
    } else {
        showToast('Cannot reject — check your permissions', 'error');
    }
};

window.doApproveWorkerTransfer = (relatedId, notifId) => {
    if (!confirm('Are you sure you want to approve this worker transfer?')) return;
    if (approveWorkerTransferRequest(relatedId)) {
        markNotificationAsRead(notifId);
        renderNotificationCenter();
        showToast('Worker transfer approved', 'success');
    } else {
        showToast('Cannot approve — check your permissions', 'error');
    }
};

window.doRejectWorkerTransfer = (relatedId, notifId) => {
    const reason = prompt('Rejection reason (optional):');
    if (reason === null) return;
    if (rejectWorkerTransferRequest(relatedId, reason)) {
        markNotificationAsRead(notifId);
        renderNotificationCenter();
        showToast('Worker transfer rejected', 'success');
    }
};

window.doApproveMR = (relatedId, notifId) => {
    if (!confirm('Approve the maintenance/calibration request and send device to vendor?')) return;
    if (approveMaintenanceRequest(relatedId)) {
        markNotificationAsRead(notifId);
        renderNotificationCenter();
        showToast('Request approved — device sent to vendor', 'success');
    } else {
        showToast('An error occurred. Check your permissions.', 'error');
    }
};

window.doRejectMR = (relatedId, notifId) => {
    const reason = prompt('Rejection reason (optional):');
    if (reason === null) return;
    if (rejectMaintenanceRequest(relatedId, reason)) {
        markNotificationAsRead(notifId);
        renderNotificationCenter();
        showToast('Maintenance/calibration request rejected', 'success');
    }
};

window.doApproveUser = (relatedId, notifId) => {
    if (!confirm('Approve this head surveyor account?')) return;
    if (approveUser(relatedId)) {
        markNotificationAsRead(notifId);
        renderNotificationCenter();
        showToast('Account approved', 'success');
    }
};

window.doRejectUser = (relatedId, notifId) => {
    if (!confirm('Reject and delete this head surveyor account?')) return;
    if (rejectUser(relatedId)) {
        markNotificationAsRead(notifId);
        renderNotificationCenter();
        showToast('Account rejected and deleted', 'success');
    }
};

function showToast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast ${type === 'error' ? 'error' : ''}`;
    el.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'}"></i> <span>${msg}</span>`;
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => { el.style.opacity='0'; el.style.transform='translateY(-20px)'; setTimeout(()=>el.remove(),500); }, 3500);
}

window.refreshPage = renderNotificationCenter;

setInterval(renderNotificationCenter, 30000);

window.onload = () => {
    renderSidebar();
    renderNotificationCenter();
};
</script>
</body>
</html>
