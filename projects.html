<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المشاريع | ساجكو</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-data-layer.js"></script>
    <script src="app-core.js"></script>
    <style>
        .project-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow .2s;
        }
        .project-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); }
        .project-header { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
        .project-title { font-size:1.1rem; font-weight:800; color:#0f172a; margin-bottom:4px; }
        .project-branch { font-size:.8rem; color:var(--text-muted); }
        .project-stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0,1fr));
            gap: 10px;
            margin: 14px 0;
        }
        @media(max-width:700px){ .project-stats { grid-template-columns: repeat(2,1fr); } }
        .project-stat {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            text-align: center;
        }
        .project-stat .num { font-size:1.4rem; font-weight:800; color:var(--primary); }
        .project-stat .lbl { font-size:.75rem; color:var(--text-muted); margin-top:2px; }
        .progress-bar-wrap {
            background: #e2e8f0;
            border-radius: 999px;
            height: 10px;
            overflow: hidden;
            margin: 8px 0 4px;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 999px;
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            transition: width .6s ease;
        }
        .surveyor-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: .82rem;
            margin: 3px;
        }
        .surveyor-tag .remove-btn {
            color: #ef4444;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            font-size: .75rem;
            line-height: 1;
        }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(4px); z-index:1000; align-items:center; justify-content:center; padding:16px; }
        .modal-box { background:#fff; border-radius:20px; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.3); }
        .modal-header { padding:20px 24px 0; display:flex; justify-content:space-between; align-items:center; }
        .modal-close { background:none; border:none; font-size:1.3rem; cursor:pointer; color:var(--text-muted); }
        .status-active { background:#dcfce7; color:#166534; border:1px solid #86efac; border-radius:20px; padding:3px 12px; font-size:.78rem; font-weight:700; }
        .status-completed { background:#f0f9ff; color:#0369a1; border:1px solid #7dd3fc; border-radius:20px; padding:3px 12px; font-size:.78rem; font-weight:700; }
        .status-paused { background:#fffbeb; color:#92400e; border:1px solid #fde68a; border-radius:20px; padding:3px 12px; font-size:.78rem; font-weight:700; }
        .tabs-header { display:flex; gap:4px; border-bottom:2px solid var(--border); margin-bottom:20px; }
        .tab-btn { padding:10px 18px; border:none; background:none; cursor:pointer; font-weight:600; color:var(--text-muted); border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .2s; font-family:inherit; font-size:.9rem; }
        .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
    </style>
</head>
<body>
<div id="appShell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">

        <div class="flex-between" style="margin-bottom:20px;">
            <div>
                <h2><i class="fa-solid fa-diagram-project" style="color:var(--primary);"></i> إدارة المشاريع</h2>
                <p style="color:var(--text-muted);font-size:.9rem;" id="pageSubtitle"></p>
            </div>
            <button onclick="openAddModal()" class="btn btn-primary">
                <i class="fa-solid fa-plus"></i> مشروع جديد
            </button>
        </div>

        <!-- Summary cards -->
        <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:20px;" id="summaryCards">
            <div class="card" style="padding:16px;text-align:center;">
                <div style="font-size:.8rem;color:var(--text-muted);">إجمالي المشاريع</div>
                <div id="statsTotal" style="font-size:1.8rem;font-weight:800;color:var(--primary);">0</div>
            </div>
            <div class="card" style="padding:16px;text-align:center;">
                <div style="font-size:.8rem;color:var(--text-muted);">نشطة</div>
                <div id="statsActive" style="font-size:1.8rem;font-weight:800;color:#16a34a;">0</div>
            </div>
            <div class="card" style="padding:16px;text-align:center;">
                <div style="font-size:.8rem;color:var(--text-muted);">إجمالي المساحين</div>
                <div id="statsSurveyors" style="font-size:1.8rem;font-weight:800;color:#7c3aed;">0</div>
            </div>
            <div class="card" style="padding:16px;text-align:center;">
                <div style="font-size:.8rem;color:var(--text-muted);">إجمالي الأجهزة</div>
                <div id="statsDevices" style="font-size:1.8rem;font-weight:800;color:#d97706;">0</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="card">
            <div class="tabs-header">
                <button class="tab-btn active" onclick="switchTab('active')">
                    <i class="fa-solid fa-circle-play"></i> المشاريع النشطة
                </button>
                <button class="tab-btn" onclick="switchTab('completed')">
                    <i class="fa-solid fa-circle-check"></i> المكتملة
                </button>
                <button class="tab-btn" onclick="switchTab('all')">
                    <i class="fa-solid fa-list"></i> الكل
                </button>
            </div>

            <div id="projectsList"></div>
        </div>

    </main>
</div>

<!-- ===== Add/Edit Project Modal ===== -->
<div class="modal-overlay" id="projectModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modalTitle">مشروع جديد</h3>
            <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div style="padding:20px 24px 24px;">
            <form id="projectForm">
                <input type="hidden" id="editProjectId">
                <div class="form-row">
                    <div class="form-group" style="flex:2;">
                        <label class="form-label">اسم المشروع *</label>
                        <input id="pName" class="form-input" required placeholder="اسم المشروع...">
                    </div>
                    <div class="form-group" style="flex:1;" id="branchSelectGroup">
                        <label class="form-label">الفرع</label>
                        <select id="pBranch" class="form-select">
                            <option value="">اختر الفرع...</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">وصف المشروع</label>
                    <textarea id="pDesc" class="form-input" rows="3" placeholder="وصف مختصر للمشروع..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">تاريخ البداية</label>
                        <input type="date" id="pStart" class="form-input apple-date-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">تاريخ الانتهاء المتوقع</label>
                        <input type="date" id="pEnd" class="form-input apple-date-input">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">نسبة الإنجاز (%)</label>
                        <div style="display:flex;gap:10px;align-items:center;">
                            <input type="range" id="pPercent" min="0" max="100" value="0"
                                oninput="document.getElementById('pPercentVal').textContent=this.value+'%'"
                                style="flex:1;">
                            <span id="pPercentVal" style="font-weight:700;color:var(--primary);min-width:40px;">0%</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">الحالة</label>
                        <select id="pStatus" class="form-select">
                            <option value="active">نشط</option>
                            <option value="completed">مكتمل</option>
                            <option value="paused">متوقف</option>
                        </select>
                    </div>
                </div>
                <div style="display:flex;gap:10px;margin-top:10px;justify-content:flex-end;">
                    <button type="button" class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> حفظ المشروع</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ===== Assign Surveyor Modal ===== -->
<div class="modal-overlay" id="assignModal" onclick="if(event.target===this)closeAssignModal()">
    <div class="modal-box">
        <div class="modal-header">
            <h3>إدارة المساحين في المشروع</h3>
            <button class="modal-close" onclick="closeAssignModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div style="padding:20px 24px 24px;">
            <div id="assignProjectName" style="font-weight:700;margin-bottom:14px;color:var(--primary);"></div>
            <input type="hidden" id="assignProjectId">

            <div class="form-group">
                <label class="form-label">إضافة مساح للمشروع</label>
                <select id="assignSurveyorSelect" class="form-select">
                    <option value="">اختر مساح...</option>
                </select>
            </div>
            <button onclick="doAssignSurveyor()" class="btn btn-primary" style="margin-bottom:20px;">
                <i class="fa-solid fa-user-plus"></i> إضافة للمشروع
            </button>

            <h4 style="margin-bottom:10px;">المساحون الحاليون في المشروع:</h4>
            <div id="currentSurveyors" style="margin-bottom:16px;"></div>

            <div id="transferSection">
                <h4 style="margin-bottom:10px;">نقل مساح لمشروع آخر:</h4>
                <div class="form-row">
                    <div class="form-group">
                        <select id="transferSurveyorSelect" class="form-select">
                            <option value="">اختر مساح للنقل...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select id="transferTargetProject" class="form-select">
                            <option value="">اختر المشروع الهدف...</option>
                        </select>
                    </div>
                </div>
                <button onclick="doTransferSurveyor()" class="btn btn-ghost" style="color:var(--primary);">
                    <i class="fa-solid fa-right-left"></i> نقل المساح
                </button>
            </div>

            <div style="margin-top:20px;text-align:left;">
                <button class="btn btn-ghost" onclick="closeAssignModal()">إغلاق</button>
            </div>
        </div>
    </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<script>
checkAuth();
const isAdmin = currentUser.role === 'admin';
const isHead  = currentUser.role === 'head';

if (!isAdmin && !isHead) {
    // Surveyors only view their own project — redirect to dashboard
    window.location.href = 'surveyor-dashboard.html';
}

let currentTab = 'active';

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', ['active','completed','all'][i] === tab);
    });
    renderProjects();
}

function getStatusBadgeHtml(status) {
    if (status === 'active') return '<span class="status-active"><i class="fa-solid fa-circle-play"></i> نشط</span>';
    if (status === 'completed') return '<span class="status-completed"><i class="fa-solid fa-circle-check"></i> مكتمل</span>';
    return '<span class="status-paused"><i class="fa-solid fa-pause-circle"></i> متوقف</span>';
}

function renderProjects() {
    reloadDB();
    let projects = getVisibleProjects();
    if (currentTab === 'active') projects = projects.filter(p => p.status === 'active');
    else if (currentTab === 'completed') projects = projects.filter(p => p.status === 'completed');

    // Update summary
    const all = getVisibleProjects();
    document.getElementById('statsTotal').textContent = all.length;
    document.getElementById('statsActive').textContent = all.filter(p => p.status === 'active').length;
    const totalSurveyors = [...new Set(all.flatMap(p => p.surveyorIds || []))].length;
    document.getElementById('statsSurveyors').textContent = totalSurveyors;
    const totalDevices = all.reduce((sum, p) => sum + getProjectDeviceCount(p.id), 0);
    document.getElementById('statsDevices').textContent = totalDevices;

    const container = document.getElementById('projectsList');
    if (!projects.length) {
        container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);">
            <i class="fa-solid fa-folder-open" style="font-size:3rem;margin-bottom:10px;display:block;opacity:.3;"></i>
            لا توجد مشاريع في هذا القسم
        </div>`;
        return;
    }

    container.innerHTML = projects.map(p => {
        const branch = db.branches.find(b => b.id === p.branchId);
        const surveyors = (p.surveyorIds || []).map(id => db.users.find(u => u.id === id)).filter(Boolean);
        const deviceCount = getProjectDeviceCount(p.id);
        const pct = Math.max(0, Math.min(100, Number(p.completionPercent || 0)));
        const today = new Date();
        const endDate = p.expectedEndDate ? new Date(p.expectedEndDate) : null;
        const daysLeft = endDate ? Math.ceil((endDate - today) / 86400000) : null;

        return `
        <div class="project-card">
            <div class="project-header">
                <div>
                    <div class="project-title">${p.name}</div>
                    <div class="project-branch">
                        <i class="fa-solid fa-location-dot" style="color:var(--primary);"></i>
                        ${branch ? branch.name : 'غير محدد'}
                        ${p.description ? ' — ' + p.description : ''}
                    </div>
                </div>
                <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
                    ${getStatusBadgeHtml(p.status)}
                    ${isAdmin || isHead ? `
                    <button onclick="openEditModal('${p.id}')" class="btn btn-ghost" style="padding:5px 8px;">
                        <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button onclick="openAssignModal('${p.id}')" class="btn btn-ghost" style="padding:5px 8px;color:#7c3aed;">
                        <i class="fa-solid fa-users-gear"></i>
                    </button>
                    <button onclick="handleDeleteProject('${p.id}')" class="btn btn-ghost" style="padding:5px 8px;color:var(--danger);">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                    ` : ''}
                </div>
            </div>

            <!-- Progress bar -->
            <div style="margin:14px 0 4px;">
                <div style="display:flex;justify-content:space-between;font-size:.8rem;color:var(--text-muted);margin-bottom:4px;">
                    <span>نسبة الإنجاز</span>
                    <span style="font-weight:700;color:${pct>=80?'#16a34a':pct>=50?'#d97706':'var(--primary)'};">${pct}%</span>
                </div>
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" style="width:${pct}%;background:${pct>=80?'linear-gradient(90deg,#16a34a,#22c55e)':pct>=50?'linear-gradient(90deg,#d97706,#f59e0b)':'linear-gradient(90deg,#2563eb,#7c3aed)'};"></div>
                </div>
            </div>

            <!-- Stats grid -->
            <div class="project-stats">
                <div class="project-stat">
                    <div class="num">${surveyors.length}</div>
                    <div class="lbl">مساحين</div>
                </div>
                <div class="project-stat">
                    <div class="num">${deviceCount}</div>
                    <div class="lbl">أجهزة</div>
                </div>
                <div class="project-stat">
                    <div class="num" style="font-size:1rem;">${p.startDate ? formatDate(p.startDate) : '—'}</div>
                    <div class="lbl">تاريخ البداية</div>
                </div>
                <div class="project-stat">
                    <div class="num" style="font-size:1rem;color:${daysLeft !== null && daysLeft < 30 ? '#dc2626' : 'var(--primary)'};">
                        ${daysLeft !== null ? (daysLeft > 0 ? `${daysLeft} يوم` : '<span style="color:#dc2626;">انتهى</span>') : '—'}
                    </div>
                    <div class="lbl">المتبقي</div>
                </div>
            </div>

            <!-- Surveyors list -->
            <div style="margin-top:10px;">
                <div style="font-size:.82rem;color:var(--text-muted);margin-bottom:6px;">المساحون المعيّنون:</div>
                ${surveyors.length
                    ? surveyors.map(s => `<span class="surveyor-tag"><i class="fa-solid fa-user-hard-hat" style="color:#7c3aed;"></i>${s.name}</span>`).join('')
                    : '<span style="color:var(--text-muted);font-size:.85rem;">لم يتم تعيين مساحين بعد</span>'
                }
            </div>
        </div>
        `;
    }).join('');
}

// ===== Project Modal =====
window.openAddModal = () => {
    document.getElementById('editProjectId').value = '';
    document.getElementById('modalTitle').textContent = 'مشروع جديد';
    document.getElementById('pName').value = '';
    document.getElementById('pDesc').value = '';
    document.getElementById('pStart').value = new Date().toISOString().split('T')[0];
    document.getElementById('pEnd').value = '';
    document.getElementById('pPercent').value = 0;
    document.getElementById('pPercentVal').textContent = '0%';
    document.getElementById('pStatus').value = 'active';

    // Branch select: only for admin
    const branchGroup = document.getElementById('branchSelectGroup');
    if (isAdmin) {
        branchGroup.style.display = '';
        document.getElementById('pBranch').innerHTML = '<option value="">اختر الفرع...</option>' +
            db.branches.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
    } else {
        branchGroup.style.display = 'none';
    }

    document.getElementById('projectModal').style.display = 'flex';
};

window.openEditModal = (id) => {
    const p = db.projects.find(x => x.id === id);
    if (!p) return;
    document.getElementById('editProjectId').value = id;
    document.getElementById('modalTitle').textContent = 'تعديل المشروع';
    document.getElementById('pName').value = p.name;
    document.getElementById('pDesc').value = p.description || '';
    document.getElementById('pStart').value = p.startDate || '';
    document.getElementById('pEnd').value = p.expectedEndDate || '';
    document.getElementById('pPercent').value = p.completionPercent || 0;
    document.getElementById('pPercentVal').textContent = (p.completionPercent || 0) + '%';
    document.getElementById('pStatus').value = p.status || 'active';

    const branchGroup = document.getElementById('branchSelectGroup');
    if (isAdmin) {
        branchGroup.style.display = '';
        document.getElementById('pBranch').innerHTML = '<option value="">اختر الفرع...</option>' +
            db.branches.map(b => `<option value="${b.id}" ${b.id === p.branchId ? 'selected' : ''}>${b.name}</option>`).join('');
    } else {
        branchGroup.style.display = 'none';
    }

    document.getElementById('projectModal').style.display = 'flex';
};

window.closeModal = () => { document.getElementById('projectModal').style.display = 'none'; };

document.getElementById('projectForm').onsubmit = e => {
    e.preventDefault();
    const editId = document.getElementById('editProjectId').value;
    const data = {
        name: document.getElementById('pName').value.trim(),
        description: document.getElementById('pDesc').value.trim(),
        startDate: document.getElementById('pStart').value,
        expectedEndDate: document.getElementById('pEnd').value || null,
        completionPercent: Number(document.getElementById('pPercent').value),
        status: document.getElementById('pStatus').value,
        branchId: isAdmin ? (document.getElementById('pBranch').value || null) : (currentUser.responsibleBranch || null)
    };
    if (!data.name) { alert('اسم المشروع مطلوب'); return; }
    if (editId) {
        updateProject(editId, data);
        showToast('تم تحديث المشروع', 'success');
    } else {
        const result = addProject(data);
        if (!result.success) { alert(result.msg); return; }
        showToast('تم إنشاء المشروع بنجاح', 'success');
    }
    closeModal();
    renderProjects();
};

window.handleDeleteProject = (id) => {
    const p = db.projects.find(x => x.id === id);
    if (!p) return;
    if (confirm(`هل أنت متأكد من حذف المشروع "${p.name}"؟`)) {
        if (deleteProject(id)) {
            showToast('تم حذف المشروع', 'success');
            renderProjects();
        }
    }
};

// ===== Assign Modal =====
window.openAssignModal = (projId) => {
    const p = db.projects.find(x => x.id === projId);
    if (!p) return;
    document.getElementById('assignProjectId').value = projId;
    document.getElementById('assignProjectName').textContent = p.name;

    // Surveyors available to assign (in branch, not already in this project)
    let availSurveyors = [];
    if (isAdmin) {
        availSurveyors = db.users.filter(u => u.role === 'surveyor' && u.status === 'approved');
    } else {
        availSurveyors = db.users.filter(u => u.role === 'surveyor' && u.status === 'approved' && u.branch === currentUser.responsibleBranch);
    }
    const currentIds = p.surveyorIds || [];

    document.getElementById('assignSurveyorSelect').innerHTML = '<option value="">اختر مساح...</option>' +
        availSurveyors.filter(s => !currentIds.includes(s.id)).map(s =>
            `<option value="${s.id}">${s.name} (${s.empId})</option>`
        ).join('');

    // Transfer selects
    document.getElementById('transferSurveyorSelect').innerHTML = '<option value="">اختر مساح للنقل...</option>' +
        availSurveyors.filter(s => currentIds.includes(s.id)).map(s =>
            `<option value="${s.id}">${s.name}</option>`
        ).join('');

    const otherProjects = getVisibleProjects().filter(pp => pp.id !== projId);
    document.getElementById('transferTargetProject').innerHTML = '<option value="">اختر المشروع الهدف...</option>' +
        otherProjects.map(pp => `<option value="${pp.id}">${pp.name}</option>`).join('');

    renderCurrentSurveyors(p);
    document.getElementById('assignModal').style.display = 'flex';
};

function renderCurrentSurveyors(p) {
    const surveyors = (p.surveyorIds || []).map(id => db.users.find(u => u.id === id)).filter(Boolean);
    const container = document.getElementById('currentSurveyors');
    if (!surveyors.length) {
        container.innerHTML = '<div style="color:var(--text-muted);font-size:.9rem;">لا يوجد مساحون في هذا المشروع حالياً.</div>';
        return;
    }
    container.innerHTML = surveyors.map(s => `
        <span class="surveyor-tag">
            <i class="fa-solid fa-user-hard-hat" style="color:#7c3aed;"></i>
            ${s.name}
            <button class="remove-btn" onclick="doRemoveSurveyor('${p.id}','${s.id}')" title="إزالة من المشروع">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </span>
    `).join('');
}

window.doAssignSurveyor = () => {
    const projId = document.getElementById('assignProjectId').value;
    const survId = document.getElementById('assignSurveyorSelect').value;
    if (!survId) { alert('الرجاء اختيار مساح'); return; }
    if (addSurveyorToProject(projId, survId)) {
        showToast('تم إضافة المساح للمشروع', 'success');
        openAssignModal(projId);
        renderProjects();
    }
};

window.doRemoveSurveyor = (projId, survId) => {
    if (confirm('هل تريد إزالة هذا المساح من المشروع؟')) {
        removeSurveyorFromProject(projId, survId);
        openAssignModal(projId);
        renderProjects();
        showToast('تم إزالة المساح من المشروع', 'success');
    }
};

window.doTransferSurveyor = () => {
    const survId = document.getElementById('transferSurveyorSelect').value;
    const targetProjId = document.getElementById('transferTargetProject').value;
    if (!survId || !targetProjId) { alert('الرجاء اختيار المساح والمشروع الهدف'); return; }
    if (transferSurveyorToProject(survId, targetProjId)) {
        const projId = document.getElementById('assignProjectId').value;
        showToast('تم نقل المساح بنجاح', 'success');
        openAssignModal(projId);
        renderProjects();
    }
};

window.closeAssignModal = () => { document.getElementById('assignModal').style.display = 'none'; };

function showToast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<i class="fa-solid ${type==='success'?'fa-circle-check':'fa-circle-exclamation'}"></i> <span>${msg}</span>`;
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => { el.style.opacity='0'; setTimeout(()=>el.remove(),400); }, 3000);
}

// Page subtitle
document.getElementById('pageSubtitle').textContent = isHead
    ? `مشاريع فرعك: ${db.branches.find(b => b.id === currentUser.responsibleBranch)?.name || ''}`
    : 'جميع المشاريع عبر الفروع';

setInterval(renderProjects, 30000);
window.onload = () => { renderSidebar(); renderProjects(); };
</script>
</body>
</html>
