<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/svg+xml" href="/assets/sajco-logo.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЕПЗСЙ ЗбЭСжЪ | УЗМЯж</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- Supabase Integration -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-data-layer.js"></script>
    <script src="app-core.js"></script>
    <script src="excel-export.js"></script>
</head>
<body>
    <div id="appShell">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="main">
            <header style="margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2 style="font-size: 1.5rem; font-weight: 700">ЕПЗСЙ ЗбЭСжЪ</h2>
                    <p style="color: var(--text-muted)">ЕЦЗЭЙ жКЪПнб жКЪннд СДУЗБ ЗбгУЗНнд ббЭСжЪ.</p>
                </div>
                <div style="display:flex;gap:8px;">
                    <button onclick="exportBranchesXLSX()" class="btn btn-ghost">
                        <i class="fa-solid fa-file-excel" style="color:#16a34a;"></i> КХПнС Excel
                    </button>
                    <button onclick="toggleBranchForm()" class="btn btn-primary">
                        <i class="fa-solid fa-plus"></i> ЕЦЗЭЙ ЭСЪ МПнП
                    </button>
                </div>
            </header>

            <!-- дгжРМ ЗбЕЦЗЭЙ жЗбКЪПнб -->
            <div class="card hidden" id="branchFormContainer">
                <h3 id="formTitle">ЕЦЗЭЙ ЭСЪ МПнП</h3>
                <form id="branchForm">
                    <input type="hidden" id="editBranchId">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px;">
                        <div class="form-group">
                            <label class="form-label">ЗУг ЗбЭСЪ (ЪСИн) <span style="color:#dc2626">*</span></label>
                            <input id="bNameAr" class="form-input" placeholder="гЛЗб: ЭСЪ ЗбСнЗЦ" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Branch Name (English)</label>
                            <input id="bNameEn" class="form-input" placeholder="e.g. Riyadh Branch">
                        </div>
                        <div class="form-group">
                            <label class="form-label">СЖнУ ЗбгУЗНнд ЗбгУДжб</label>
                            <select id="bHeadSurveyor" class="form-select">
                                <option value="">бЗ нжМП</option>
                            </select>
                        </div>
                    </div>
                    <div style="margin-top: 20px; display: flex; gap: 10px;">
                        <button type="submit" class="btn btn-primary">НЭЩ ЗбИнЗдЗК</button>
                        <button type="button" onclick="toggleBranchForm()" class="btn btn-ghost">ЕбЫЗБ</button>
                    </div>
                </form>
            </div>

            <!-- МПжб ЗбЭСжЪ -->
            <div class="card">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>ЗУг ЗбЭСЪ</th>
                                <th>English Name</th>
                                <th>СЖнУ ЗбгУЗНнд</th>
                                <th>ЗбЕМСЗБЗК</th>
                            </tr>
                        </thead>
                        <tbody id="branchesTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div class="designer-credit">
        <div><i class="fa-solid fa-code" style="color: var(--primary); margin-left: 6px;"></i>Кг КХгнг ЗбгжЮЪ ИжЗУШЙ <strong>гНгжП ЗбФШжСм</strong></div>
        <div style="font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 6px; padding-top: 4px; display: flex; align-items: center; justify-content: center; gap: 6px;">
            <span>ИЕФСЗЭ ЗбгедПУ <strong>гНгП нжУЭ ЗЮШнШ</strong></span>
            <i class="fa-solid fa-user-tie" style="color: #1e3a8a; font-size: 0.9rem;"></i>
        </div>
    </div>

    <script>
        checkAuth();
        if (currentUser.role !== 'admin') {
            window.location.href = 'dashboard.html'; // ЭЮШ ЗбгПнС нгЯде ЗбжХжб
        }

        function toggleBranchForm() {
            const container = document.getElementById('branchFormContainer');
            container.classList.toggle('hidden');
            if (container.classList.contains('hidden')) {
                document.getElementById('branchForm').reset();
                document.getElementById('editBranchId').value = '';
                document.getElementById('bNameAr').value = '';
                document.getElementById('bNameEn').value = '';
                document.getElementById('formTitle').innerText = 'ЕЦЗЭЙ ЭСЪ МПнП';
                populateHeadSurveyors();
            } else {
                populateHeadSurveyors();
            }
        }

        function populateHeadSurveyors(currentHeadId = null) {
            const select = document.getElementById('bHeadSurveyor');
            const availableHeads = db.users.filter(u => 
                u.role === 'head' && (!u.responsibleBranch || u.id === currentHeadId)
            );
            select.innerHTML = '<option value="">бЗ нжМП</option>' + 
                availableHeads.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
            if (currentHeadId) select.value = currentHeadId;
        }

        function refreshBranchesTable() {
            const tbody = document.getElementById('branchesTableBody');
            const sorted = [...db.branches].sort((a, b) => (a.serialNumber || 0) - (b.serialNumber || 0));
            tbody.innerHTML = sorted.map(b => {
                const head = db.users.find(u => u.responsibleBranch === b.id);
                return `
                    <tr>
                        <td><span style="font-weight:700;color:var(--primary)">${b.serialNumber || '—'}</span></td>
                        <td><strong>${b.nameAr || b.name}</strong></td>
                        <td style="color:var(--text-muted)">${b.nameEn || '—'}</td>
                        <td>${head ? head.name : '<span style="color:var(--text-muted)">ЫнС гЪнд</span>'}</td>
                        <td>
                            <button onclick="editBranch('${b.id}')" class="btn btn-ghost" style="padding: 5px 10px;" title="КЪПнб ЗбЭСЪ"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="assignHeadToBranch('${b.id}')" class="btn btn-ghost" style="padding: 5px 10px; color:#2563eb;" title="КЪннд СЖнУ гУЗНнд"><i class="fa-solid fa-user-tie"></i></button>
                            <button onclick="deleteBranch('${b.id}')" class="btn btn-ghost" style="padding: 5px 10px; color: var(--danger);" title="НРЭ ЗбЭСЪ"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            }).join('') || '<tr><td colspan="5" style="text-align:center; padding:20px;">бЗ КжМП ЭСжЪ гЦЗЭЙ ИЪП.</td></tr>';
        }

        document.getElementById('branchForm').onsubmit = (e) => {
            e.preventDefault();
            const id      = document.getElementById('editBranchId').value;
            const nameAr  = document.getElementById('bNameAr').value.trim();
            const nameEn  = document.getElementById('bNameEn').value.trim();
            const headId  = document.getElementById('bHeadSurveyor').value;

            // ЕбЫЗБ КЪннд СЖнУ ЗбгУЗНнд ЗбЮПнг
            db.users.forEach(u => { if (u.responsibleBranch === id) u.responsibleBranch = null; });

            let resolvedId = id;
            if (id) {
                updateBranchName(id, nameAr, nameEn || nameAr);
            } else {
                resolvedId = _safeUUID();
                addBranch(resolvedId, nameAr, nameEn || nameAr);
            }

            // КЪннд СЖнУ ЗбгУЗНнд ЗбМПнП
            if (headId) {
                const branchId = resolvedId;
                const head = db.users.find(u => u.id === headId);
                if (head) head.responsibleBranch = branchId;
                saveDB();
            }

            toggleBranchForm();
            refreshBranchesTable();
            if (typeof populateBranches === 'function') populateBranches();
        };

        window.editBranch = (id) => {
            const b = db.branches.find(branch => branch.id === id);
            if (!b) { alert('ЗбЭСЪ ЫнС гжМжП'); return; }
            const head = db.users.find(u => u.responsibleBranch === id);
            document.getElementById('editBranchId').value = b.id;
            document.getElementById('bNameAr').value = b.nameAr || b.name || '';
            document.getElementById('bNameEn').value = b.nameEn || '';
            populateHeadSurveyors(head ? head.id : null);
            document.getElementById('formTitle').innerText = 'КЪПнб ЗбЭСЪ';
            document.getElementById('branchFormContainer').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.assignHeadToBranch = (id) => {
            const b = db.branches.find(branch => branch.id === id);
            if (!b) { alert('ЗбЭСЪ ЫнС гжМжП'); return; }
            const currentHead = db.users.find(u => u.responsibleBranch === id);
            document.getElementById('editBranchId').value = b.id;
            document.getElementById('bNameAr').value = b.nameAr || b.name || '';
            document.getElementById('bNameEn').value = b.nameEn || '';
            populateHeadSurveyors(currentHead ? currentHead.id : null);
            document.getElementById('formTitle').innerText = 'КЪннд СЖнУ гУЗНнд ббЭСЪ';
            document.getElementById('branchFormContainer').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // ПЗбЙ deleteBranch ЗбГУЗУнЙ гжМжПЙ ЗбВд Эн app-core.js
        // дЮжг едЗ ИКЫбнЭеЗ бЕЦЗЭЙ гдШЮ КНПнЛ жЗМеЙ ЗбгУКОПг ЗбОЗХ ИеРе ЗбХЭНЙ
        const coreDeleteBranch = window.deleteBranch; // дНХб Ъбм ЗбПЗбЙ гд app-core.js
        window.deleteBranch = (id) => {
            if (coreDeleteBranch(id)) { // дУКПЪн ЗбПЗбЙ ЗбГУЗУнЙ ЗбКн ККЪЗгб гЪ ЗбКГЯнП жЗбНРЭ ЗбЭЪбн
                refreshBranchesTable();
                // КНПнЛ ЮЗЖгЙ ЗбЭСжЪ Эн ХЭНЙ ЗбгУКОПгнд ГнЦЗр
                if (typeof populateBranches === 'function') populateBranches();
            }
        };
        window.refreshPage = refreshBranchesTable;
        window.onload = async () => {
            renderSidebar();
            await _loadRemoteDB();
            refreshBranchesTable();
        };
    </script>
</body>
</html>
