<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملف الموظف - SAJCO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .profile-header {
            display: flex; align-items: center; gap: 20px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: #fff; border-radius: 16px; padding: 24px 28px; margin-bottom: 20px;
        }
        .profile-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,.2); display: flex;
            align-items: center; justify-content: center;
            font-size: 2.2rem; flex-shrink: 0;
        }
        .profile-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 4px; }
        .profile-meta { font-size: .88rem; opacity: .85; display: flex; flex-wrap: wrap; gap: 12px; }
        .profile-meta span { display: flex; align-items: center; gap: 5px; }
        .section-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 20px; margin-bottom: 16px;
        }
        .section-title {
            font-size: 1rem; font-weight: 700; color: var(--primary);
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
            border-bottom: 2px solid var(--border); padding-bottom: 10px;
        }
        .info-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px;
        }
        .info-item { display: flex; flex-direction: column; gap: 3px; }
        .info-label { font-size: .75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .info-value { font-size: .95rem; font-weight: 600; color: var(--text); }
        .device-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; background: #f8fafc; border-radius: 10px;
            margin-bottom: 8px; border: 1px solid var(--border);
        }
        .device-serial { font-size: .8rem; color: var(--text-muted); }
        .worker-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 14px; background: #f8fafc; border-radius: 10px;
            margin-bottom: 6px; border: 1px solid var(--border); font-size: .88rem;
        }
        .leave-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 14px; background: #f8fafc; border-radius: 10px;
            margin-bottom: 6px; font-size: .88rem; border: 1px solid var(--border);
        }
        .stat-box {
            text-align: center; padding: 16px; background: #f0f9ff;
            border-radius: 12px; border: 1px solid #bae6fd;
        }
        .stat-num { font-size: 1.8rem; font-weight: 800; color: #0284c7; }
        .stat-lbl { font-size: .78rem; color: var(--text-muted); margin-top: 2px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .empty-state { text-align: center; color: var(--text-muted); padding: 20px; font-size: .9rem; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        #profileContent { display: none; }
        .rating-stars { color: #f59e0b; font-size: 1.1rem; }
        @media print {
            .no-print { display: none !important; }
            .section-card { break-inside: avoid; }
        }
    </style>
</head>
<body>
<div id="appShell">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">

        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <h2 style="margin:0;"><i class="fa-solid fa-id-card" style="color:#2563eb;margin-left:8px;"></i> الاستعلام عن موظف</h2>
                <div style="display:flex;gap:8px;" id="exportBtns" class="no-print hidden">
                    <button onclick="exportProfileXLSX()" class="btn btn-ghost">
                        <i class="fa-solid fa-file-excel" style="color:#16a34a;"></i> تصدير Excel
                    </button>
                    <button onclick="window.print()" class="btn btn-ghost">
                        <i class="fa-solid fa-print" style="color:#2563eb;"></i> طباعة
                    </button>
                </div>
            </div>

            <div class="search-bar no-print">
                <input type="text" id="searchInput" class="form-input" style="flex:1;"
                    placeholder="ابحث بالرقم الوظيفي أو اسم الموظف..."
                    oninput="liveSearch(this.value)">
                <div id="searchSuggestions" style="position:relative;"></div>
            </div>
            <div id="suggestionBox" style="position:absolute;z-index:100;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);max-width:500px;width:100%;display:none;max-height:220px;overflow-y:auto;"></div>
        </div>

        <div id="profileContent">

            <!-- Header -->
            <div class="profile-header">
                <div class="profile-avatar"><i class="fa-solid fa-user-tie"></i></div>
                <div>
                    <div class="profile-name" id="pName">—</div>
                    <div class="profile-meta">
                        <span><i class="fa-solid fa-id-badge"></i> <span id="pEmpId">—</span></span>
                        <span><i class="fa-solid fa-briefcase"></i> <span id="pRole">—</span></span>
                        <span><i class="fa-solid fa-code-branch"></i> <span id="pBranch">—</span></span>
                        <span id="pStatusBadge"></span>
                    </div>
                </div>
            </div>

            <!-- إحصائيات سريعة -->
            <div class="stats-row" id="statsRow"></div>

            <!-- البيانات الشخصية -->
            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-user"></i> البيانات الشخصية</div>
                <div class="info-grid" id="personalInfo"></div>
            </div>

            <!-- بيانات العمل -->
            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-briefcase"></i> بيانات العمل</div>
                <div class="info-grid" id="workInfo"></div>
            </div>

            <!-- الأجهزة في العهدة -->
            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-microchip"></i> الأجهزة في العهدة</div>
                <div id="devicesList"></div>
            </div>

            <!-- العمال تحت إشرافه -->
            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-hard-hat"></i> العمال تحت إشرافه</div>
                <div id="workersList"></div>
            </div>

            <!-- سجل الإجازات -->
            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-umbrella-beach"></i> سجل الإجازات</div>
                <div id="leavesList"></div>
            </div>

            <!-- التقييمات -->
            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-star"></i> التقييمات</div>
                <div id="ratingsList"></div>
            </div>

            <!-- المشاريع -->
            <div class="section-card">
                <div class="section-title"><i class="fa-solid fa-diagram-project"></i> المشاريع المرتبط بها</div>
                <div id="projectsList"></div>
            </div>

        </div><!-- end profileContent -->

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase-config.js"></script>
<script src="supabase-data-layer.js"></script>
<script src="app-core.js"></script>
<script src="excel-export.js"></script>
<script>
checkAuth();

// صلاحية الوصول: مدير، رئيس مساحين، مطور فقط
if (!['admin','head','developer'].includes(currentUser.role)) {
    alert('ليس لديك صلاحية للوصول لهذه الصفحة.');
    location.href = 'dashboard.html';
}

let _currentProfileUser = null;

const _roleLabel = r => ({ admin: 'مدير عام', head: 'رئيس مساحين', surveyor: 'مساح', developer: 'مطور' }[r] || r);
const _statusLabel = s => ({ approved: 'نشط', pending: 'بانتظار الموافقة', suspended: 'موقوف' }[s] || s);
const _leaveTypeLabel = t => ({ annual: 'سنوية', emergency: 'طارئة', sick: 'مرضية', other: 'أخرى' }[t] || t);
const _leaveStatusLabel = s => ({ approved: 'معتمدة', rejected: 'مرفوضة', pending: 'بانتظار', cancelled: 'ملغاة', pending_head_approval: 'بانتظار رئيس المساحين', pending_admin_approval: 'بانتظار المدير' }[s] || s);
const _fmt = d => d ? new Date(d).toLocaleDateString('ar-SA') : '—';
const _infoItem = (label, value) =>
    `<div class="info-item"><div class="info-label">${label}</div><div class="info-value">${value || '—'}</div></div>`;

// ===== بحث حي =====
function liveSearch(val) {
    const box = document.getElementById('suggestionBox');
    if (!val || val.length < 2) { box.style.display = 'none'; return; }
    const q = val.toLowerCase();

    let list = db.users.filter(u => u.status === 'approved' &&
        (String(u.empId).includes(q) || u.name?.toLowerCase().includes(q)));

    // رئيس المساحين يرى فرعه فقط
    if (currentUser.role === 'head') {
        list = list.filter(u => u.branch === currentUser.responsibleBranch || u.id === currentUser.id);
    }

    if (!list.length) { box.style.display = 'none'; return; }

    box.innerHTML = list.slice(0, 8).map(u =>
        `<div onclick="loadProfile('${u.id}')"
            style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;"
            onmouseover="this.style.background='#f0f9ff'" onmouseout="this.style.background=''">
            <i class="fa-solid fa-user" style="color:#2563eb;"></i>
            <div>
                <div style="font-weight:600;">${u.name}</div>
                <div style="font-size:.78rem;color:#64748b;">رقم وظيفي: ${u.empId} · ${_roleLabel(u.role)}</div>
            </div>
        </div>`
    ).join('');
    box.style.display = 'block';
}

document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('suggestionBox').style.display = 'none';
});
document.addEventListener('click', e => {
    if (!e.target.closest('#suggestionBox') && !e.target.closest('#searchInput'))
        document.getElementById('suggestionBox').style.display = 'none';
});

// ===== تحميل الملف الشخصي =====
async function loadProfile(userId) {
    document.getElementById('suggestionBox').style.display = 'none';
    await _loadRemoteDB();

    const u = db.users.find(x => x.id === userId);
    if (!u) { alert('لم يتم العثور على الموظف'); return; }

    // رئيس المساحين: تحقق أن الموظف من فرعه
    if (currentUser.role === 'head' && u.branch !== currentUser.responsibleBranch && u.id !== currentUser.id) {
        alert('لا يمكنك الاطلاع على بيانات موظف من فرع آخر'); return;
    }

    _currentProfileUser = u;
    const branch = db.branches.find(b => b.id === u.branch || b.id === u.responsibleBranch);
    const headUser = db.users.find(x => x.id === u.headSurveyor)
        || getBranchHead(u.branch)
        || getBranchHead(u.responsibleBranch);
    const custodies = db.custodies.filter(c => c.userId === u.id && c.status === 'approved');
    const devices = custodies.map(c => db.devices.find(d => d.serial === c.serialNumber) || { serial: c.serialNumber, type: c.deviceType });
    const workers = (db.workers || []).filter(w => w.surveyorId === u.id);
    const leaves = (db.leaveRequests || []).filter(r => r.userId === u.id).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    const approvedLeaves = leaves.filter(r => r.status === 'approved');
    const totalApprovedDays = approvedLeaves.reduce((s, r) => s + (r.approvedDays || r.requestedDays || 0), 0);
    const lastLeave = approvedLeaves[0];
    const ratings = (db.ratings || []).filter(r => r.userId === u.id).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
    const avgRating = ratings.length ? (ratings.reduce((s,r) => s + (r.stars||0), 0) / ratings.length).toFixed(1) : null;
    const projects = (db.projects || []).filter(p => p.surveyorIds?.includes(u.id));
    const activeWorkers = workers.filter(w => w.status === 'available').length;

    // ===== Header =====
    document.getElementById('pName').textContent = u.name;
    document.getElementById('pEmpId').textContent = u.empId;
    document.getElementById('pRole').textContent = _roleLabel(u.role);
    document.getElementById('pBranch').textContent = branch?.name || '—';
    document.getElementById('pStatusBadge').innerHTML =
        `<span class="badge ${u.status==='approved'?'badge-success':u.status==='pending'?'badge-warning':'badge-danger'}">
            ${_statusLabel(u.status)}
        </span>`;

    // ===== إحصائيات سريعة =====
    document.getElementById('statsRow').innerHTML = [
        { num: custodies.length, lbl: 'جهاز في العهدة', icon: 'fa-microchip', color: '#0284c7' },
        { num: workers.length, lbl: 'إجمالي العمال', icon: 'fa-hard-hat', color: '#7c3aed' },
        { num: activeWorkers, lbl: 'عامل نشط', icon: 'fa-circle-check', color: '#059669' },
        { num: approvedLeaves.length, lbl: 'إجازة معتمدة', icon: 'fa-umbrella-beach', color: '#d97706' },
        { num: totalApprovedDays, lbl: 'يوم إجازة كلي', icon: 'fa-calendar-days', color: '#dc2626' },
        { num: avgRating ? `${avgRating}★` : '—', lbl: 'متوسط التقييم', icon: 'fa-star', color: '#f59e0b' },
    ].map(s => `
        <div class="stat-box">
            <div style="font-size:1.4rem;color:${s.color};margin-bottom:4px;"><i class="fa-solid ${s.icon}"></i></div>
            <div class="stat-num" style="color:${s.color};">${s.num}</div>
            <div class="stat-lbl">${s.lbl}</div>
        </div>`).join('');

    // ===== البيانات الشخصية =====
    document.getElementById('personalInfo').innerHTML = [
        _infoItem('الاسم الكامل', u.name),
        _infoItem('الرقم الوظيفي', u.empId),
        _infoItem('البريد الإلكتروني', u.email),
        _infoItem('رقم الجوال', u.phone),
        _infoItem('الجنسية', u.nationality),
        _infoItem('تاريخ الانضمام', _fmt(u.joinDate)),
    ].join('');

    // ===== بيانات العمل =====
    const joinDate = u.joinDate ? new Date(u.joinDate) : null;
    const yearsInCompany = joinDate
        ? Math.floor((new Date() - joinDate) / (365.25 * 24 * 3600 * 1000))
        : (u.companyExp || null);
    document.getElementById('workInfo').innerHTML = [
        _infoItem('الوظيفة', _roleLabel(u.role)),
        _infoItem('الفرع', branch?.name),
        _infoItem('رئيس المساحين', headUser?.name),
        _infoItem('المشروع الحالي', u.project || (projects[0]?.name)),
        _infoItem('إجمالي سنوات الخبرة', u.totalExp ? `${u.totalExp} سنة` : null),
        _infoItem('سنوات في الشركة', yearsInCompany !== null ? `${yearsInCompany} سنة` : null),
        _infoItem('تاريخ انضمام الشركة', _fmt(u.joinDate)),
        _infoItem('آخر إجازة معتمدة', lastLeave ? `${_fmt(lastLeave.startDate)} (${lastLeave.approvedDays || lastLeave.requestedDays || '—'} يوم)` : null),
        _infoItem('الحالة', _statusLabel(u.status)),
    ].join('');

    // ===== الأجهزة =====
    document.getElementById('devicesList').innerHTML = devices.length
        ? devices.map(d => `
            <div class="device-row">
                <div>
                    <div style="font-weight:600;">${getDeviceTypeName(d.type || d.deviceType)}</div>
                    <div class="device-serial">S/N: ${d.serial || d.serialNumber}</div>
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                    ${d.calDate ? `<span style="font-size:.8rem;color:#64748b;"><i class="fa-solid fa-calendar-check"></i> ${_fmt(d.calDate)}</span>` : ''}
                    ${getDeviceStatusBadge(d.status || 'assigned')}
                </div>
            </div>`).join('')
        : '<div class="empty-state"><i class="fa-solid fa-box-open"></i><br>لا توجد أجهزة في العهدة</div>';

    // ===== العمال =====
    document.getElementById('workersList').innerHTML = workers.length
        ? workers.map(w => `
            <div class="worker-row">
                <i class="fa-solid fa-user-helmet-safety" style="color:#7c3aed;"></i>
                <div style="flex:1;">
                    <strong>${w.name}</strong>
                    <span style="font-size:.78rem;color:#64748b;margin-right:8px;">${w.residenceId ? `إقامة: ${w.residenceId}` : ''}</span>
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                    ${w.nationality ? `<span style="font-size:.78rem;color:#64748b;">${w.nationality}</span>` : ''}
                    <span class="badge ${w.status==='available'?'badge-success':w.status==='on_leave'?'badge-warning':''}">
                        ${{ available:'نشط', on_leave:'في إجازة', departed:'غادر', terminated:'منتهي' }[w.status] || w.status}
                    </span>
                </div>
            </div>`).join('')
        : '<div class="empty-state"><i class="fa-solid fa-users-slash"></i><br>لا يوجد عمال مسجلون</div>';

    // ===== الإجازات =====
    document.getElementById('leavesList').innerHTML = leaves.length
        ? `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px;">
            <div class="stat-box"><div class="stat-num">${leaves.length}</div><div class="stat-lbl">إجمالي الطلبات</div></div>
            <div class="stat-box"><div class="stat-num">${approvedLeaves.length}</div><div class="stat-lbl">معتمدة</div></div>
            <div class="stat-box"><div class="stat-num">${totalApprovedDays}</div><div class="stat-lbl">إجمالي الأيام</div></div>
          </div>` +
          leaves.slice(0, 10).map(r => `
            <div class="leave-item">
                <div>
                    <strong>${_leaveTypeLabel(r.type)}</strong>
                    <span style="font-size:.78rem;color:#64748b;margin-right:6px;">${_fmt(r.startDate)} ← ${_fmt(r.endDate)}</span>
                </div>
                <div style="display:flex;gap:8px;align-items:center;">
                    <span style="font-size:.8rem;color:#64748b;">${r.approvedDays || r.requestedDays || '—'} يوم</span>
                    <span class="badge ${r.status==='approved'?'badge-success':r.status==='rejected'?'badge-danger':'badge-warning'}">
                        ${_leaveStatusLabel(r.status)}
                    </span>
                </div>
            </div>`).join('')
        : '<div class="empty-state"><i class="fa-solid fa-calendar-xmark"></i><br>لا توجد إجازات مسجلة</div>';

    // ===== التقييمات =====
    document.getElementById('ratingsList').innerHTML = ratings.length
        ? `<div style="margin-bottom:12px;font-size:1.1rem;">
            <strong>المتوسط:</strong>
            <span class="rating-stars">${'★'.repeat(Math.round(avgRating))}${'☆'.repeat(5-Math.round(avgRating))}</span>
            <span style="color:#f59e0b;font-weight:700;">${avgRating}</span> من 5
           </div>` +
          ratings.slice(0, 5).map(r => {
              const rater = db.users.find(x => x.id === r.ratedBy);
              return `<div class="leave-item">
                <div>
                    <span class="rating-stars">${'★'.repeat(r.stars||0)}</span>
                    <span style="font-size:.78rem;color:#64748b;margin-right:8px;">بواسطة: ${rater?.name || '—'}</span>
                </div>
                <div style="font-size:.78rem;color:#64748b;">${_fmt(r.timestamp)}</div>
              </div>`;
          }).join('')
        : '<div class="empty-state"><i class="fa-solid fa-star-slash"></i><br>لا توجد تقييمات</div>';

    // ===== المشاريع =====
    document.getElementById('projectsList').innerHTML = projects.length
        ? projects.map(p => `
            <div class="leave-item">
                <div>
                    <strong>${p.name}</strong>
                    ${p.code ? `<span style="font-size:.78rem;color:#64748b;margin-right:6px;">(${p.code})</span>` : ''}
                    ${p.location ? `<span style="font-size:.78rem;color:#64748b;">📍 ${p.location}</span>` : ''}
                </div>
                <span class="badge ${p.status==='active'?'badge-success':''}">
                    ${p.status==='active'?'نشط':p.status||'—'}
                </span>
            </div>`).join('')
        : '<div class="empty-state"><i class="fa-solid fa-diagram-project"></i><br>لا توجد مشاريع مرتبطة</div>';

    document.getElementById('profileContent').style.display = 'block';
    document.getElementById('exportBtns').classList.remove('hidden');
    document.getElementById('searchInput').value = u.name;
}

// ===== تصدير Excel =====
window.exportProfileXLSX = () => {
    if (!_currentProfileUser || typeof XLSX === 'undefined') {
        if (typeof _waitXLSX === 'function') _waitXLSX(() => exportProfileXLSX());
        return;
    }
    const u = _currentProfileUser;
    const branch = db.branches.find(b => b.id === u.branch || b.id === u.responsibleBranch);
    const headUser = db.users.find(x => x.id === u.headSurveyor)
        || getBranchHead(u.branch)
        || getBranchHead(u.responsibleBranch);
    const custodies = db.custodies.filter(c => c.userId === u.id && c.status === 'approved');
    const workers = (db.workers || []).filter(w => w.surveyorId === u.id);
    const leaves = (db.leaveRequests || []).filter(r => r.userId === u.id && r.status === 'approved');
    const totalDays = leaves.reduce((s,r) => s + (r.approvedDays || r.requestedDays || 0), 0);
    const ratings = (db.ratings || []).filter(r => r.userId === u.id);
    const avgRating = ratings.length ? (ratings.reduce((s,r) => s + (r.stars||0), 0) / ratings.length).toFixed(1) : '—';
    const projects = (db.projects || []).filter(p => p.surveyorIds?.includes(u.id));

    const joinDate = u.joinDate ? new Date(u.joinDate) : null;
    const yearsInCompany = joinDate
        ? Math.floor((new Date() - joinDate) / (365.25 * 24 * 3600 * 1000))
        : (u.companyExp || '—');

    const wb = XLSX.utils.book_new();

    // ورقة 1: البيانات الأساسية
    const basicRows = [
        { 'البيان': 'الاسم الكامل', 'القيمة': u.name },
        { 'البيان': 'الرقم الوظيفي', 'القيمة': u.empId },
        { 'البيان': 'البريد الإلكتروني', 'القيمة': u.email },
        { 'البيان': 'رقم الجوال', 'القيمة': u.phone || '—' },
        { 'البيان': 'الجنسية', 'القيمة': u.nationality || '—' },
        { 'البيان': 'الوظيفة', 'القيمة': _roleLabel(u.role) },
        { 'البيان': 'الفرع', 'القيمة': branch?.name || '—' },
        { 'البيان': 'رئيس المساحين', 'القيمة': headUser?.name || '—' },
        { 'البيان': 'المشروع الحالي', 'القيمة': u.project || (projects[0]?.name) || '—' },
        { 'البيان': 'إجمالي سنوات الخبرة', 'القيمة': u.totalExp ? `${u.totalExp} سنة` : '—' },
        { 'البيان': 'سنوات في الشركة', 'القيمة': yearsInCompany !== null ? `${yearsInCompany} سنة` : '—' },
        { 'البيان': 'تاريخ الانضمام', 'القيمة': u.joinDate || '—' },
        { 'البيان': 'عدد الأجهزة في العهدة', 'القيمة': custodies.length },
        { 'البيان': 'عدد العمال', 'القيمة': workers.length },
        { 'البيان': 'إجمالي أيام الإجازة المعتمدة', 'القيمة': totalDays },
        { 'البيان': 'متوسط التقييم', 'القيمة': avgRating },
        { 'البيان': 'الحالة', 'القيمة': _statusLabel(u.status) },
    ];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(basicRows), 'البيانات الأساسية');

    // ورقة 2: الأجهزة
    if (custodies.length) {
        const devRows = custodies.map(c => {
            const d = db.devices.find(x => x.serial === c.serialNumber);
            return {
                'نوع الجهاز': getDeviceTypeName(c.deviceType),
                'الرقم التسلسلي': c.serialNumber,
                'تاريخ الاستلام': c.receiptDate || '—',
                'تاريخ المعايرة': d?.calDate || '—',
                'الحالة': d?.status || 'assigned',
            };
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(devRows), 'الأجهزة');
    }

    // ورقة 3: العمال
    if (workers.length) {
        const wRows = workers.map(w => ({
            'الاسم': w.name,
            'رقم الإقامة': w.residenceId || '—',
            'الجنسية': w.nationality || '—',
            'الجوال': w.phone || '—',
            'الحالة': { available:'نشط', on_leave:'في إجازة', departed:'غادر', terminated:'منتهي' }[w.status] || w.status,
        }));
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(wRows), 'العمال');
    }

    // ورقة 4: الإجازات
    const leaveAllRows = (db.leaveRequests || []).filter(r => r.userId === u.id).map(r => ({
        'النوع': _leaveTypeLabel(r.type),
        'تاريخ المغادرة': r.startDate || '—',
        'تاريخ العودة': r.endDate || '—',
        'الأيام المطلوبة': r.requestedDays || '—',
        'الأيام المعتمدة': r.approvedDays || '—',
        'الحالة': _leaveStatusLabel(r.status),
    }));
    if (leaveAllRows.length)
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(leaveAllRows), 'الإجازات');

    const today = new Date().toLocaleDateString('en-GB').replace(/\//g, '-');
    XLSX.writeFile(wb, `ملف_${u.name}_${today}.xlsx`);
};

// ===== تحميل أولي =====
window.onload = async () => {
    renderSidebar();
    await _loadRemoteDB();

    // إذا تم تمرير empId عبر URL
    const params = new URLSearchParams(location.search);
    const empId = params.get('empId');
    if (empId) {
        const u = db.users.find(x => String(x.empId) === String(empId));
        if (u) loadProfile(u.id);
    }
};
</script>
